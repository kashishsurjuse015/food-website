<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Indian Food Paradise</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff5e6; text-align: center; }
        .contact-container { background: white; width: 50%; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #ff9800; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Get in Touch with Us</h2>
        <p>Swagat hai! Any questions about our Indian menu? Message us below.</p>
        <form action="/contact" method="POST">
            <input type="text" name="name" placeholder="Aapka Naam" required>
            <input type="email" name="email" placeholder="Aapki Email" required>
            <textarea name="message" rows="5" placeholder="Aapka Message ya Feedback" required></textarea>
            <br>
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
<section style="padding: 40px; background-color: #f9f9f9; border-bottom: 2px solid #ddd;">
    <h2>For Bulk Orders & Party Orders</h2>
    <p>Message Us</p>
    
    <form action="/contact" method="POST" style="display: flex; flex-wrap: wrap; gap: 10px;">
        <div style="flex: 1; min-width: 250px;">
            <input type="text" name="name" placeholder="Your Name" required style="width: 100%; margin-bottom: 10px;">
            <input type="email" name="email" placeholder="Enter Your Email" required style="width: 100%; margin-bottom: 10px;">
            <input type="tel" name="mobile" placeholder="Enter Your Mobile no" required style="width: 100%;">
            
            <div style="margin-top: 15px;">
                <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="150" style="border:0;" allowfullscreen=""></iframe>
            </div>
        </div>
        
        <div style="flex: 1; min-width: 250px;">
            <textarea name="message" placeholder="Write Message Here..." style="width: 100%; height: 200px;"></textarea>
            <button type="submit" style="margin-top: 10px; background-color: #d32f2f; color: white; padding: 10px 20px; border: none; cursor: pointer;">Submit</button>
        </div>
    </form>
</section>
